<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الاختبار الكروي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body {
            margin: 0; padding: 20px; font-family: 'Cairo', sans-serif;
            background: url('https://i.pinimg.com/1200x/19/7a/21/197a21c924994ae84016e9a56d959b36.jpg') no-repeat center center fixed;
            background-size: cover; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box;
        }
        .quiz-container {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); padding: 30px;
            border-radius: 15px; color: white; width: 100%; max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 90vh; overflow-y: auto;
        }
        .question-img { max-width: 100%; height: 250px; object-fit: contain; border-radius: 10px; margin-bottom: 15px; display: none; }
        .options { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .option-label {
            background: rgba(255,255,255,0.1); padding: 12px; border-radius: 8px; cursor: pointer;
            transition: 0.3s; display: flex; align-items: center;
        }
        .option-label:hover { background: rgba(255,255,255,0.2); }
        .option-label input { margin-left: 10px; }
        .controls { display: flex; justify-content: space-between; margin-top: 25px; }
        button {
            padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer;
            font-family: 'Cairo', sans-serif; font-weight: bold; font-size: 16px; transition: 0.3s;
        }
        .btn-next { background: #007bff; color: white; }
        .btn-prev { background: #6c757d; color: white; }
        .btn-finish { background: #28a745; color: white; display: none; }
        
        /* تنسيق النتائج المحسن */
        .result-box { text-align: center; }
        .review-card {
            background: rgba(255,255,255,0.08); padding: 20px; border-radius: 12px;
            margin-bottom: 20px; text-align: right; border: 1px solid rgba(255,255,255,0.15);
        }
        .review-img { max-width: 100%; height: 200px; object-fit: contain; border-radius: 8px; margin: 10px 0; background: rgba(0,0,0,0.3); }
        .ans-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-radius: 6px; margin-top: 5px; }
        .user-ans { background: rgba(255,255,255,0.1); }
        .correct-ans { background: rgba(40, 167, 69, 0.2); border-right: 4px solid #28a745; }
        .wrong-ans { background: rgba(220, 53, 69, 0.2); border-right: 4px solid #dc3545; }
    </style>
</head>
<body>

    <div class="quiz-container" id="mainContainer">
        <h3 id="loadingText" style="text-align:center;">جاري تحميل الاختبار...</h3>
    </div>

    <!-- سكريبت الحماية -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWTSFTecq2_QeDyg90mM1hPNytwPXYyZ0",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const phone = localStorage.getItem('studentPhone');

        if (!phone) window.location.href = 'login.html';

        let questions = [];
        let currentQ = 0;
        let userAnswers = {};
        const container = document.getElementById('mainContainer');

        // جلب الأسئلة من ملف JSON بدلاً من الكود المباشر
        fetch('questions.json')
            .then(res => res.json())
            .then(data => {
                questions = data;
                init();
            })
            .catch(err => {
                container.innerHTML = "<h3 style='text-align:center;color:red;'>حدث خطأ في تحميل الأسئلة.</h3>";
            });

        async function init() {
            const userRef = ref(db, 'students/' + phone);
            const snapshot = await get(userRef);
            if (!snapshot.exists()) { window.location.href = 'login.html'; return; }
            
            const userData = snapshot.val();
            
            if (userData.finished) {
                if (userData.resultPublished) {
                    showResultsView(userData);
                } else {
                    container.innerHTML = `<div class="result-box">
                        <h2>لقد امتحنت بالفعل!</h2>
                        <p>شكراً لك، ستظهر النتيجة قريباً عندما يعتمدها المعلم.</p>
                    </div>`;
                }
            } else {
                renderQuizUI();
                loadQuestion();
            }
        }

        function renderQuizUI() {
            container.innerHTML = `
                <div id="quizSection">
                    <h2 id="qNumber">سؤال 1 من ${questions.length}</h2>
                    <h3 id="qText"></h3>
                    <img id="qImg" class="question-img" src="" alt="صورة السؤال">
                    <div class="options" id="optionsContainer"></div>
                    <div class="controls">
                        <button class="btn-prev" id="prevBtn" onclick="window.prevQ()">السابق</button>
                        <button class="btn-next" id="nextBtn" onclick="window.nextQ()">التالي</button>
                        <button class="btn-finish" id="finishBtn" onclick="window.finishQuiz()">إنهاء الاختبار</button>
                    </div>
                </div>
            `;
        }

        window.loadQuestion = function() {
            document.getElementById('qNumber').innerText = `سؤال ${currentQ + 1} من ${questions.length}`;
            document.getElementById('qText').innerText = questions[currentQ].q;
            
            const imgEl = document.getElementById('qImg');
            if(questions[currentQ].img) {
                imgEl.src = questions[currentQ].img;
                imgEl.style.display = "block";
            } else {
                imgEl.style.display = "none";
            }

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = "";
            questions[currentQ].options.forEach(opt => {
                const isChecked = userAnswers[currentQ] === opt ? "checked" : "";
                optionsContainer.innerHTML += `
                    <label class="option-label" onclick="window.saveAnswer('${opt}')">
                        <input type="radio" name="qOption" value="${opt}" ${isChecked}>
                        ${opt}
                    </label>
                `;
            });

            document.getElementById('prevBtn').disabled = currentQ === 0;
            
            if (currentQ === questions.length - 1) {
                document.getElementById('nextBtn').style.display = "none";
                document.getElementById('finishBtn').style.display = "block";
            } else {
                document.getElementById('nextBtn').style.display = "block";
                document.getElementById('finishBtn').style.display = "none";
            }
        }

        window.saveAnswer = function(opt) {
            userAnswers[currentQ] = opt;
            document.querySelectorAll('input[name="qOption"]').forEach(el => {
                el.checked = (el.value === opt);
            });
        }

        window.nextQ = function() { if (currentQ < questions.length - 1) { currentQ++; loadQuestion(); } }
        window.prevQ = function() { if (currentQ > 0) { currentQ--; loadQuestion(); } }

        window.finishQuiz = async function() {
            if(Object.keys(userAnswers).length < questions.length) {
                alert("يرجى الإجابة على جميع الأسئلة قبل الإنهاء.");
                return;
            }
            
            document.getElementById('finishBtn').innerText = "جاري الحفظ...";
            document.getElementById('finishBtn').disabled = true;

            let score = 0;
            let finalAnswers = [];
            questions.forEach((q, idx) => {
                const isCorrect = userAnswers[idx] === q.answer;
                if(isCorrect) score++;
                // تخزين الصورة مع الإجابة لسهولة عرضها لاحقاً
                finalAnswers.push({
                    question: q.q,
                    img: q.img,
                    userAns: userAnswers[idx],
                    correctAns: q.answer,
                    isCorrect: isCorrect
                });
            });

            const userRef = ref(db, 'students/' + phone);
            await update(userRef, { finished: true, score: score, answers: finalAnswers });

            container.innerHTML = `<div class="result-box">
                <h2>تم تسليم الإجابات بنجاح!</h2>
                <p>شكراً لك، ستظهر النتيجة قريباً.</p>
            </div>`;
        }

        function showResultsView(userData) {
            let html = `<div class="result-box"><h2>نتيجتك: ${userData.score} / ${userData.answers.length}</h2><div style="text-align:right; margin-top:20px;">`;
            userData.answers.forEach((ans, idx) => {
                const imgHtml = ans.img ? `<img src="${ans.img}" class="review-img" alt="صورة السؤال">` : '';
                html += `
                    <div class="review-card">
                        <h4 style="margin:0 0 10px 0;">س ${idx+1}: ${ans.question}</h4>
                        ${imgHtml}
                        <div class="ans-row user-ans ${ans.isCorrect ? 'correct-ans' : 'wrong-ans'}">
                            <span>إجابتك: <strong>${ans.userAns}</strong></span>
                            <span>${ans.isCorrect ? '✅ صحيحة' : '❌ خاطئة'}</span>
                        </div>
                        ${!ans.isCorrect ? `
                        <div class="ans-row correct-ans" style="margin-top:10px;">
                            <span>الإجابة الصحيحة: <strong>${ans.correctAns}</strong></span>
                        </div>` : ''}
                    </div>
                `;
            });
            html += `</div></div>`;
            container.innerHTML = html;
        }
    </script>
</body>
</html>
