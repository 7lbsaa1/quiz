<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المعلم - الاختبار الكروي</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');
        body { margin: 0; padding: 20px; font-family: 'Cairo', sans-serif; background: #f4f6f9; color: #333; }
        .header { background: #343a40; color: white; padding: 15px 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;}
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:hover { background: #f1f1f1; }
        
        button { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-family: 'Cairo'; font-weight: bold; margin-left: 5px; color: white; transition: 0.2s;}
        .btn-view { background: #17a2b8; } .btn-view:hover{ background: #138496; }
        .btn-publish { background: #28a745; } .btn-publish:hover{ background: #218838; }
        .btn-publish:disabled { background: #6c757d; cursor: not-allowed; }

        /* Modal Styles */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000;}
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2);}
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .close { cursor: pointer; font-size: 28px; color: #dc3545; font-weight: bold; }
        
        /* تصميم بطاقات الإجابات للأدمن */
        .admin-answer-card { background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .admin-answer-card.correct { border-right: 5px solid #28a745; }
        .admin-answer-card.wrong { border-right: 5px solid #dc3545; }
        .q-img { max-width: 100%; height: 180px; object-fit: contain; border-radius: 8px; margin: 10px 0; display: block; background: #f8f9fa; }
        .ans-detail { padding: 8px 12px; border-radius: 6px; margin-top: 8px; font-size: 15px; }
        .ans-detail.student { background: #f1f3f5; }
        .ans-detail.correct-key { background: #d4edda; color: #155724; }
    </style>
</head>
<body>

    <div class="header">
        <h2>لوحة تحكم الاختبار الكروي</h2>
        <p>إجمالي المُمتحنين: <span id="totalCount">0</span></p>
    </div>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>رقم الهاتف</th>
                <th>النتيجة</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
            </tr>
        </thead>
        <tbody id="studentsTable">
            <tr><td colspan="5" style="text-align: center;">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>

    <div id="answersModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalStudentName" style="margin: 0;"></h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- سكريبت الحماية -->
    <script>
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false;
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false;
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBWTSFTecq2_QeDyg90mM1hPNytwPXYyZ0",
            authDomain: "admin-37e09.firebaseapp.com",
            databaseURL: "https://admin-37e09-default-rtdb.firebaseio.com",
            projectId: "admin-37e09",
            storageBucket: "admin-37e09.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let studentsData = {};

        const studentsRef = ref(db, 'students');
        onValue(studentsRef, (snapshot) => {
            const tbody = document.getElementById('studentsTable');
            tbody.innerHTML = '';
            
            if (snapshot.exists()) {
                studentsData = snapshot.val();
                let count = 0;
                for (const phone in studentsData) {
                    const s = studentsData[phone];
                    if(!s.finished) continue; 
                    count++;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.name}</td>
                        <td dir="ltr" style="text-align:right;">${s.phone}</td>
                        <td><strong>${s.score}</strong></td>
                        <td>${s.resultPublished ? '<span style="color:green; font-weight:bold;">تم النشر</span>' : '<span style="color:orange; font-weight:bold;">مخفية</span>'}</td>
                        <td>
                            <button class="btn-view" onclick="window.viewAnswers('${phone}')">عرض الإجابات</button>
                            <button class="btn-publish" onclick="window.publishResult('${phone}')" ${s.resultPublished ? 'disabled' : ''}>إظهار النتيجة للطالب</button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                }
                document.getElementById('totalCount').innerText = count;
                if(count === 0) tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا يوجد طلاب أنهوا الاختبار بعد</td></tr>';
            } else {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">لا توجد بيانات</td></tr>';
            }
        });

        window.viewAnswers = function(phone) {
            const s = studentsData[phone];
            document.getElementById('modalStudentName').innerText = `إجابات: ${s.name}`;
            
            let html = '';
            if(s.answers) {
                s.answers.forEach((ans, idx) => {
                    const statusClass = ans.isCorrect ? 'correct' : 'wrong';
                    const imgHtml = ans.img ? `<img src="${ans.img}" class="q-img" alt="صورة السؤال">` : '';
                    
                    html += `
                        <div class="admin-answer-card ${statusClass}">
                            <h4 style="margin-top:0;">س ${idx+1}: ${ans.question}</h4>
                            ${imgHtml}
                            <div class="ans-detail student">
                                إجابته: <strong style="color:${ans.isCorrect ? '#28a745' : '#dc3545'};">${ans.userAns}</strong>
                                ${ans.isCorrect ? ' ✅' : ' ❌'}
                            </div>
                            ${!ans.isCorrect ? `
                            <div class="ans-detail correct-key">
                                الإجابة الصحيحة: <strong>${ans.correctAns}</strong>
                            </div>` : ''}
                        </div>
                    `;
                });
            } else {
                html = '<p style="text-align:center;">لا توجد تفاصيل إجابات مسجلة (النسخة القديمة).</p>';
            }
            
            document.getElementById('modalBody').innerHTML = html;
            document.getElementById('answersModal').style.display = 'flex';
        }

        window.publishResult = async function(phone) {
            if(confirm('هل أنت متأكد من إظهار النتيجة لهذا الطالب؟')) {
                const userRef = ref(db, 'students/' + phone);
                await update(userRef, { resultPublished: true });
            }
        }

        window.closeModal = function() { document.getElementById('answersModal').style.display = 'none'; }
    </script>
</body>
</html>
